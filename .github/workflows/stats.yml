name: Refresh stats cards

on:
  schedule:
    - cron: "45 3 * * *"   # daily, offset from snake
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download stats SVGs
        run: |
          # Only overwrite if response is not an error card
          curl -sf "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=kxdrsrt&theme=tokyonight" \
            -o /tmp/stats_new.svg \
            && grep -qv 'ERROR' /tmp/stats_new.svg \
            && cp /tmp/stats_new.svg assets/stats.svg \
            || echo "stats: rate-limited or failed, keeping cached file"

          curl -sf "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=kxdrsrt&theme=tokyonight" \
            -o /tmp/langs_new.svg \
            && grep -qv 'ERROR' /tmp/langs_new.svg \
            && cp /tmp/langs_new.svg assets/languages.svg \
            || echo "languages: rate-limited or failed, keeping cached file"

      - name: Commit refreshed SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh stats cards"
