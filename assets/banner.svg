<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Kadir Sert - Software Engineer at Siemens AG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1A2B"/>
      <stop offset="1" stop-color="#0E2A2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0098FF"/>
      <stop offset="1" stop-color="#00C2A8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0098FF"/>
      <stop offset="1" stop-color="#00C2A8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="220" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="220" rx="4" fill="url(#accent)"/>

  <!-- circuit motif -->
  <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.55">
    <path d="M980 60 h70 v40 h60"/>
    <path d="M980 160 h110 v-30 h20"/>
    <path d="M1040 110 h70"/>
  </g>
  <g fill="#00C2A8">
    <circle cx="980" cy="60" r="5"/>
    <circle cx="1110" cy="100" r="5"/>
    <circle cx="980" cy="160" r="5"/>
    <circle cx="1110" cy="110" r="5"/>
    <circle cx="1040" cy="110" r="5"/>
  </g>
  <g fill="#0098FF" opacity="0.85">
    <circle cx="1050" cy="60" r="5"/>
    <circle cx="1090" cy="130" r="5"/>
  </g>

  <text x="48" y="108" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#F4F8FB">Kadir Sert</text>
  <text x="50" y="152" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#8BA6BC">Software Engineer at Siemens AG</text>
  <rect x="50" y="170" width="150" height="4" rx="2" fill="url(#line)"/>
  <text x="214" y="174" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#5E7E88">Erlangen, Germany</text>
</svg>
