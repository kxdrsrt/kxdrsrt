<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="90" viewBox="0 0 1200 90" role="img" aria-label="Thanks for stopping by">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1A2B"/>
      <stop offset="1" stop-color="#0E2A2A"/>
    </linearGradient>
    <linearGradient id="faccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0098FF"/>
      <stop offset="1" stop-color="#00C2A8"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0098FF"/>
      <stop offset="1" stop-color="#00C2A8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="90" rx="16" fill="url(#fbg)"/>
  <rect x="0" y="0" width="8" height="90" rx="4" fill="url(#faccent)"/>

  <!-- left circuit motif -->
  <g stroke="url(#fline)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M60 30 h60 v30 h40"/>
    <path d="M60 62 h90"/>
  </g>
  <g fill="#00C2A8">
    <circle cx="60" cy="30" r="4.5"/>
    <circle cx="120" cy="60" r="4.5"/>
    <circle cx="150" cy="62" r="4.5"/>
  </g>
  <circle cx="120" cy="30" r="4.5" fill="#0098FF"/>

  <!-- right circuit motif (mirrored) -->
  <g stroke="url(#fline)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M1140 30 h-60 v30 h-40"/>
    <path d="M1140 62 h-90"/>
  </g>
  <g fill="#00C2A8">
    <circle cx="1140" cy="30" r="4.5"/>
    <circle cx="1080" cy="60" r="4.5"/>
    <circle cx="1050" cy="62" r="4.5"/>
  </g>
  <circle cx="1080" cy="30" r="4.5" fill="#0098FF"/>

  <text x="600" y="46" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#F4F8FB">Thanks for stopping by</text>
  <text x="600" y="70" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#8BA6BC">Built in Erlangen, Germany</text>
</svg>
